name: Network Quality Agent
version: "0.1.3"
slug: network_quality_agent
description: Lightweight local metrics agent for Network Quality integration
url: "https://github.com/northpower25/ha-network-inet-monitor"
startup: services
boot: auto
init: false
host_network: true
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Metrics and health endpoint
arch:
  - aarch64
  - amd64
  - armv7
  - i386
options:
  bind_host: "0.0.0.0"
  bind_port: 8099
  interval_seconds: 60
  speedtest_interval_seconds: 900
  speedtest_timeout_seconds: 120
  connect_timeout_seconds: 3
  probe_attempts: 3
  targets:
    - "1.1.1.1"
    - "8.8.8.8"
    - "9.9.9.9"
  token: ""
  # HTTP download test – BNetzA-analogous multi-server measurement
  http_download_targets:
    - "speedtest.wtnet.de"
    - "speedtest.studiofunk.de"
    - "fra.speedtest.clouvider.net"
  http_download_path: "/10G.bin"
  http_download_duration_seconds: 10
  http_download_streams: 4
  # iperf3 tests – DE servers
  iperf3_targets:
    - "fra.speedtest.clouvider.net"
    - "speedtest.wtnet.de"
    - "speedtest.studiofunk.de"
  # iperf3 additional EU diversity servers
  iperf3_eu_targets:
    - "ams.speedtest.clouvider.net"
    - "lon.speedtest.clouvider.net"
  iperf3_port: 5201
  iperf3_duration_seconds: 10
  iperf3_streams: 4
  # Ookla speedtest (provider: ookla_auto)
  speedtest_ookla_enabled: true
schema:
  bind_host: str
  bind_port: port
  interval_seconds: int(10,86400)
  speedtest_interval_seconds: int(0,86400)
  speedtest_timeout_seconds: int(10,600)
  connect_timeout_seconds: float(0.5,30)
  probe_attempts: int(1,10)
  targets:
    - str
  token: str?
  http_download_targets:
    - str
  http_download_path: str
  http_download_duration_seconds: int(5,120)
  http_download_streams: int(1,16)
  iperf3_targets:
    - str
  iperf3_eu_targets:
    - str
  iperf3_port: port
  iperf3_duration_seconds: int(5,120)
  iperf3_streams: int(1,16)
  speedtest_ookla_enabled: bool
